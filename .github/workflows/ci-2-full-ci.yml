# =============================================================
# ИТЕРАЦИЯ 2: Полный CI
# -------------------------------------------------------------
# Добавляем реальные проверки качества кода.
# Теперь пайплайн запускается и на PR — плохой код не попадёт
# в main, даже если разработчик забудет проверить локально.
#
# Новое в этой итерации:
# - Триггер на pull_request
# - Шаги: lint, type-check, test
# - npm ci вместо npm install
# - Принцип Fail Fast: быстрые проверки идут первыми
#
# ⚠️ Этот workflow отключён по умолчанию (workflow_dispatch).
# Чтобы активировать, замените блок on: на:
#   on:
#     push:
#       branches: [main, develop]
#     pull_request:
#       branches: [main, develop]
# =============================================================

name: CI — 2. Full CI

on:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # npm ci отличается от npm install:
      # - Строго следует package-lock.json (воспроизводимая сборка)
      # - Удаляет node_modules перед установкой
      # - Не обновляет package-lock.json
      # - Работает быстрее в CI окружении
      # Правило: в пайплайне — всегда npm ci, локально — npm install
      - name: Install dependencies
        run: npm ci

      # Принцип Fail Fast: запускаем самые быстрые проверки первыми.
      # Если линтер упадёт за 5 секунд — незачем ждать 2 минуты сборки.
      # Порядок: lint → type-check → test → build

      # Шаг: Проверка стиля кода через ESLint.
      # Находит неиспользуемые переменные, нарушения правил и т.д.
      - name: Lint
        run: npm run lint

      # Шаг: Проверка типов TypeScript.
      # Ловит ошибки типов без запуска компилятора.
      - name: Type check
        run: npm run type-check

      # Шаг: Запуск unit-тестов через Vitest.
      - name: Tests
        run: npm run test

      # Шаг: Финальная сборка.
      # Запускается последней — самый дорогой шаг.
      - name: Build
        run: npm run build

# =============================================================
# ЗАДАНИЕ:
# 1. Создай ветку: git checkout -b feature/test-ci
# 2. Добавь намеренную ошибку линтера:
#    const unused = "это сломает линтер"  // в App.tsx
# 3. Открой Pull Request в GitHub
# 4. Посмотри как пайплайн блокирует мерж
# 5. Найди и исправь ошибку — пайплайн должен позеленеть
# =============================================================
