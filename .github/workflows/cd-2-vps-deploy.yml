# =============================================================
# CD ИТЕРАЦИЯ 2: Деплой на VPS через SSH
# -------------------------------------------------------------
# Реальный деплой на собственный сервер. Именно так работает
# большинство production деплоев в небольших командах.
#
# Как это работает:
# Runner подключается к серверу по SSH и выполняет команды
# так же, как если бы ты подключился сам через терминал.
#
# ⚠️ Подготовка перед использованием:
#
# 1. Генерируем SSH-ключ (локально):
#    ssh-keygen -t ed25519 -C "github-actions-deploy"
#
# 2. Добавляем публичный ключ на сервер:
#    ssh-copy-id -i ~/.ssh/id_ed25519.pub user@your-server.com
#    или вручную: cat ~/.ssh/id_ed25519.pub >> ~/.ssh/authorized_keys
#
# 3. Добавляем секреты в GitHub:
#    Settings → Secrets and variables → Actions → New repository secret
#    SSH_PRIVATE_KEY  → содержимое файла ~/.ssh/id_ed25519 (приватный ключ)
#    SERVER_HOST      → IP-адрес или домен сервера
#    SERVER_USER      → имя пользователя (например: ubuntu, root)
#
# 4. На сервере должны быть установлены: Node.js, npm, PM2
#    Установка PM2: npm install -g pm2
#
# ⚠️ Этот workflow отключён по умолчанию (workflow_dispatch).
# Чтобы активировать, замените блок on: на:
#   on:
#     push:
#       branches: [main]
# =============================================================

name: CD — 2. VPS Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci
      - run: npm run build

      # Деплой на сервер через SSH.
      # ${{ secrets.NAME }} — безопасный способ передать секрет в workflow.
      # Секреты никогда не отображаются в логах — GitHub маскирует их.
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Команды выполняются на сервере последовательно.
          # Если одна упадёт — следующие не выполнятся.
          script: |
            # Переходим в папку приложения на сервере
            cd /var/www/myapp

            # Обновляем код из репозитория
            git pull origin main

            # Устанавливаем зависимости (только production)
            npm ci --production

            # Собираем приложение на сервере
            npm run build

            # Перезапускаем сервис через PM2 (process manager)
            # PM2 следит чтобы приложение не упало и перезапускает его при ошибке
            pm2 restart myapp

# =============================================================
# ЗАДАНИЕ:
# 1. Добавь три секрета в репозиторий (инструкция выше)
# 2. Запушь в main и наблюдай за шагом Deploy в логах Actions
# 3. После завершения — открой приложение на сервере
# 4. Внеси изменение, запушь — убедись что деплой произошёл автоматически
# =============================================================
