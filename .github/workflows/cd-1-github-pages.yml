# =============================================================
# CD ИТЕРАЦИЯ 1: Деплой на GitHub Pages
# -------------------------------------------------------------
# Самый простой способ задеплоить статическое React-приложение.
# Не нужен сервер, не нужны секреты — только один токен,
# который GitHub предоставляет автоматически.
#
# Результат: приложение доступно по адресу
# https://<username>.github.io/<repository-name>/
#
# ⚠️ Перед использованием:
# Включи GitHub Pages в Settings → Pages → Source: GitHub Actions
#
# ⚠️ Этот workflow отключён по умолчанию (workflow_dispatch).
# Чтобы активировать, замените блок on: на:
#   on:
#     push:
#       branches: [main]
# =============================================================

name: CD — 1. GitHub Pages

on:
  push:
    branches: [main]

# Разрешения нужны для деплоя через GitHub Pages.
# pages: write — для публикации, id-token: write — для верификации.
permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Привязка к environment "github-pages" (создаётся автоматически).
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci
      # GitHub Pages отдаёт сайт по пути /<repo-name>/.
      # Без VITE_BASE_PATH Vite генерирует ссылки от корня (/assets/…),
      # и браузер не находит JS/CSS-файлы → 404.
      - run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      # Загружаем артефакт для GitHub Pages.
      # По умолчанию берёт содержимое из ./dist.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # Деплой на GitHub Pages.
      # Используем официальный экшен от GitHub —
      # не нужны сторонние зависимости и дополнительные токены.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# =============================================================
# ЗАДАНИЕ:
# 1. Включи GitHub Pages: Settings → Pages → Source: GitHub Actions
# 2. Запушь в main и дождись завершения пайплайна
# 3. Открой приложение по адресу: https://<username>.github.io/<repo>/
# 4. Внеси изменение в App.tsx и снова запушь
# 5. Убедись что обновление появилось автоматически
# =============================================================
