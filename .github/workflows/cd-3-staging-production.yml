# =============================================================
# CD ИТЕРАЦИЯ 3: Staging + Production
# -------------------------------------------------------------
# Production-ready пайплайн с двумя окружениями.
#
# Архитектура веток:
#   feature/* → PR → CI (проверки)
#   develop   → push → CI + деплой на STAGING (автоматически)
#   main      → push → CI + деплой на PRODUCTION (с подтверждением)
#
# Что нового:
# - if: условный запуск job'а в зависимости от ветки
# - environment: окружения с отдельными секретами
# - Required reviewers: деплой на prod требует ручного approve
# - download-artifact: переиспользуем уже собранный dist
#
# ⚠️ Настройка окружений в GitHub:
# Settings → Environments → New environment
# Создай два окружения: "staging" и "production"
# Для "production" добавь Required reviewers — это включит
# обязательное ручное подтверждение перед деплоем
#
# Секреты можно задать отдельно для каждого окружения —
# тогда staging и production будут деплоиться на разные серверы
#
# ⚠️ Этот workflow отключён по умолчанию (workflow_dispatch).
# Чтобы активировать, замените блок on: на:
#   on:
#     push:
#       branches: [main, develop]
#     pull_request:
#       branches: [main, develop]
# =============================================================

name: CD — 3. Staging + Production

on:
  workflow_dispatch:

jobs:
  # ─── CI: запускается всегда при push и PR ───────────────────
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test
      - run: npm run build

      # Сохраняем артефакт — CD jobs скачают его, не пересобирая
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─── STAGING: деплой при пуше в develop ─────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    # Ждём успешного завершения CI
    needs: ci
    # Условие: запускаем ТОЛЬКО при пуше в develop (не на PR)
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    # Окружение со своими секретами (STAGING_HOST и т.д.)
    environment: staging

    steps:
      # Скачиваем артефакт собранный в job'е ci
      # Не нужно заново клонировать репо и запускать сборку
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deploying to STAGING..."
            cd /var/www/staging
            rm -rf dist
            # В реальном проекте здесь rsync или scp для копирования dist
            pm2 restart myapp-staging
            echo "Staging deploy complete!"

  # ─── PRODUCTION: деплой при пуше в main ─────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: ci
    # Условие: запускаем ТОЛЬКО при пуше в main (не на PR)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Окружение с Required reviewers — включает ручное подтверждение.
    # Job будет ждать пока кто-то из reviewers не нажмёт "Approve" в GitHub.
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deploying to PRODUCTION..."
            cd /var/www/production
            rm -rf dist
            pm2 restart myapp-production
            echo "Production deploy complete!"

# =============================================================
# ЗАДАНИЕ:
# 1. Создай окружения staging и production в Settings → Environments
# 2. Для production добавь себя как Required reviewer
# 3. Запушь в develop → убедись что деплой на staging прошёл автоматически
# 4. Смержи develop в main → дождись запроса на подтверждение
# 5. Подтверди деплой в GitHub → убедись что production обновился
# =============================================================
