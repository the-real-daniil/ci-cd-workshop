# =============================================================
# ИТЕРАЦИЯ 1: Hello Pipeline
# -------------------------------------------------------------
# Самый простой пайплайн. Цель — понять структуру workflow:
# из чего он состоит и как запускается.
#
# Запустится при: git push в ветку main
# Что делает: устанавливает зависимости и собирает проект
# =============================================================

name: CI — 1. Hello Pipeline

# Триггер: запускаем пайплайн при каждом пуше в main
on:
  push:
    branches: [main]

jobs:
  # Job — единица работы. Может быть несколько jobs в одном workflow.
  # Каждый job запускается на отдельной виртуальной машине.
  build:
    # Указываем тип машины (runner), на которой выполняется job.
    # ubuntu-latest — это виртуальная машина с Ubuntu, предоставляемая GitHub бесплатно.
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Checkout — клонируем репозиторий на runner.
      # Без этого шага у runner нет доступа к нашему коду.
      # actions/checkout@v4 — это готовый экшен из GitHub Marketplace.
      - name: Checkout code
        uses: actions/checkout@v5

      # Шаг 2: Устанавливаем Node.js нужной версии.
      # cache: 'npm' — кэшируем node_modules между запусками (ускоряет пайплайн).
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"

      # Шаг 3: Устанавливаем зависимости.
      # npm install — устанавливает зависимости, может обновлять package-lock.json.
      # Для начала используем npm install — на следующей итерации заменим на npm ci.
      - name: Install dependencies
        run: npm install

      # Шаг 4: Собираем проект.
      # Если сборка падает — пайплайн завершается с ошибкой и мерж блокируется.
      - name: Build
        run: npm run build

# =============================================================
# ЗАДАНИЕ:
# 1. Запушь изменения и открой вкладку Actions в репозитории
# 2. Найди запущенный workflow и изучи логи каждого шага
# 3. Намеренно сломай сборку (добавь синтаксическую ошибку в App.tsx)
# 4. Запушь и посмотри как выглядит упавший пайплайн
# 5. Почини ошибку и убедись что пайплайн снова зелёный
# =============================================================
